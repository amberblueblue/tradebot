app:
  mode: paper
  polling_interval_seconds: 30
futures:
  base_url: https://fapi.binance.com
  request_timeout_seconds: 10
  rules_cache_ttl_seconds: 3600
risk:
  max_leverage: 2.0
  max_margin_per_trade_usdt: 20.0
  max_single_order_usdt: 20
  max_position_ratio: 0.2
  min_liquidation_distance_pct: 15.0
  max_funding_rate_abs: 0.001
  paper_test_max_funding_rate_abs: 0.005
  max_consecutive_losing_trades: 4
  stop_loss_pct: 20.0
  partial1_sell_pct: 30.0
  partial2_sell_pct: 50.0
  big_candle_multiplier: 1.5
  big_candle_body_lookback: 20
  profit_giveback_ratio: 0.5
  profit_protection_trigger_pct: 15.0
strategy:
  trend_long:
    ema_fast: 44
    ema_slow: 144
    macd_fast: 16
    macd_slow: 32
    macd_signal: 9
    rsi_period: 14
    min_rsi: 45
    max_rsi: 75
    rsi_overheat: 75
    max_hold_bars: 30
    min_expected_return: 0.0
  trend_long_test:
    ema_fast: 44
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    rsi_period: 14
safety:
  allow_live_trading: false
  live_execute_enabled: false
