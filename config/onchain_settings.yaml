app:
  mode: paper
  polling_interval_seconds: 60

quote:
  auto_refresh_enabled: true
  quote_stale_seconds: 600
  default_amount_usdt: 20

live:
  auto_live_enabled: false
  default_order_amount_usdt: 20
  require_manual_confirm_env: true
  wallet_signing_enabled: false
  broadcast_enabled: false
  approve_enabled: false
  approve_mode: exact_amount
  require_wallet_env: true
  max_live_order_usdt: 20
  max_live_trades_per_day: 3

safety:
  allow_live_trading: false
  live_execute_enabled: false

risk:
  max_price_impact_pct: 1.0
  max_slippage_pct: 1.0
  max_gas_raw: 500000
  quote_stale_seconds: 600
  max_token_tax_rate_pct: 0.0
  max_trade_usdt: 50
  max_live_order_usdt: 20
  max_live_trades_per_day: 3
  max_open_positions: 3
  max_opens_per_day: 5
  max_closes_per_day: 5
  min_trade_interval_seconds: 300

rpc:
  ethereum: ""
  base: ""
  arbitrum: ""
