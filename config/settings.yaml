app:
  mode: paper
exchange:
  name: binance
  base_url: https://api.binance.com
  api_key: ""
  api_secret: ""
  recv_window: 5000
market:
  default_symbol: VIRTUALUSDT
  default_symbols:
    - VIRTUALUSDT
  timeframe:
    entry: 1h
    trend: 4h
  polling_interval_seconds: 60
backtest:
  initial_capital: 10000.0
  report_file: reports/backtest_dashboard.html
  log_file: logs/backtest_events.json
paper:
  initial_cash: 10000.0
  state_file: runtime/paper_state.json
  trade_log_file: logs/paper_trades.jsonl
execution:
  enabled_symbols:
    - VIRTUALUSDT
  fixed_order_quote_amount: 1000.0
  cash_usage_pct: 0.1
  max_positions: 3
  stop_loss_pct: 3.0
  take_profit_pct: 6.0
  max_consecutive_errors: 3
  runtime_state_file: runtime/robot_state.json
  robot_initial_status: running
  status_file: runtime/status.json
safety:
  allow_live_trading: false
  max_consecutive_errors: 3
logging:
  level: INFO
  system_log_file: logs/system.log
  trade_log_file: logs/trade.log
  error_log_file: logs/error.log
live:
  enabled: false
feature_engine:
  atr_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  rsi_period: 14
  swing_atr_multiplier: 1.5
strategy:
  ema_slope_lookback: 5
  macd_decay_bars: 3
  rsi_overheat: 80.0
  entry_cooldown_bars: 8
  max_hold_bars: 72
  min_expected_return: 5.0
risk:
  stop_loss_pct: 20.0
  partial1_sell_pct: 30.0
  partial2_sell_pct: 50.0
  big_candle_multiplier: 1.5
  big_candle_body_lookback: 20
  profit_giveback_ratio: 0.5
  profit_protection_trigger_pct: 15.0
