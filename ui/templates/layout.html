<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TraderBot Console{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="preload"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <noscript>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
  </noscript>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom bg-white">
    <div class="container">
      <span class="navbar-brand mb-0 h1">TraderBot Console</span>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link" href="/health">Health</a>
        <a class="nav-link" href="/positions">Positions</a>
        <a class="nav-link" href="/performance">Performance</a>
        <a class="nav-link" href="/account">Account</a>
        <a class="nav-link" href="/symbols">Symbols</a>
        <a class="nav-link" href="/logs">Logs</a>
        <a class="nav-link" href="/config">Config</a>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
